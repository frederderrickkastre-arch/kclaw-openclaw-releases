name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BRAND_LOWER: kclaw

jobs:
  # =========================================================================
  # Build desktop apps for Windows, macOS, Linux
  # =========================================================================
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: win-x64
          - platform: macos-latest
            target: universal-apple-darwin
            artifact_suffix: mac-universal

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        working-directory: manager-app
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: manager-app
          tauriScript: npx tauri
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      # Collect and rename artifacts
      - name: Collect artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p dist
          # Headless binary for server deployment (install.sh uses this)
          cp manager-app/src-tauri/target/release/${{ env.BRAND_LOWER }}-manager dist/${{ env.BRAND_LOWER }}-manager-linux-x64 || true
          # .deb package
          cp manager-app/src-tauri/target/release/bundle/deb/*.deb dist/ || true
          # .AppImage
          cp manager-app/src-tauri/target/release/bundle/appimage/*.AppImage dist/ || true

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          # .exe installer
          Copy-Item "manager-app\src-tauri\target\release\bundle\nsis\*.exe" -Destination "dist\" -ErrorAction SilentlyContinue
          # .msi installer
          Copy-Item "manager-app\src-tauri\target\release\bundle\msi\*.msi" -Destination "dist\" -ErrorAction SilentlyContinue
          # Standalone exe
          Copy-Item "manager-app\src-tauri\target\release\${{ env.BRAND_LOWER }}-manager.exe" -Destination "dist\${{ env.BRAND_LOWER }}-manager-win-x64.exe" -ErrorAction SilentlyContinue
          # Create zip
          Compress-Archive -Path "dist\${{ env.BRAND_LOWER }}-manager-win-x64.exe" -DestinationPath "dist\${{ env.BRAND_LOWER }}-manager-win-x64.zip" -ErrorAction SilentlyContinue

      - name: Collect artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p dist
          # .dmg
          cp manager-app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/ || true
          # .pkg (if available, Tauri may generate this)
          cp manager-app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_suffix }}
          path: dist/*
          if-no-files-found: warn

  # =========================================================================
  # Create GitHub Release with all artifacts
  # =========================================================================
  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Collected artifacts ==="
          find artifacts -type f | sort
          echo ""

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "${{ env.BRAND_LOWER }}-manager ${{ steps.version.outputs.version }}"
          body: |
            ## KClaw OpenClaw Manager ${{ steps.version.outputs.version }}

            ### 安装方式

            **Linux 服务器（推荐）：**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            **Windows：** 下载 `.exe` 或 `.zip` 文件

            **macOS：** 下载 `.dmg` 文件

            ### 下载

            查看下方 Assets 列表，选择对应平台的安装包。
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate Tauri updater JSON for auto-update
      - name: Generate updater manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "KClaw OpenClaw Manager ${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/${{ env.BRAND_LOWER }}-manager-win-x64.zip"
              },
              "darwin-universal": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/${{ env.BRAND_LOWER }}-manager-mac-universal.app.tar.gz"
              },
              "linux-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/${{ env.BRAND_LOWER }}-manager-linux-x64"
              }
            }
          }
          EOF

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
